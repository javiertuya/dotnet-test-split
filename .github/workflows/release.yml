name: Publish to NuGet
on:
  release:
    types: [created]
jobs:
  publish:
    #if: ${{ false }}  # disable for now
    runs-on: ubuntu-latest 
    permissions:
      contents: read
      packages: write
      id-token: write # required for nuget.org trusted publishing (OIDC token issuance)
    steps:
      - uses: actions/checkout@v7
      - name: Select .NET Version
        uses: actions/setup-dotnet@v5.4.0
        with:
            dotnet-version: '10.0.x'
      - name: Pack
        run: dotnet pack --configuration Release DotnetTestSplit/DotnetTestSplit.csproj
      #- name: Push to GitHub packages
      #  run: |
      #    dotnet nuget add source --username javiertuya --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/javiertuya/index.json"
      #    dotnet nuget push DotnetTestSplit/nupkg/*.nupkg  --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"
      #  env:
      #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Trusted Publishing: exchanges the GitHub OIDC token for a short-lived (1h) nuget.org API key.
      # Requires a trusted publishing policy configured at nuget.org matching this repo and workflow file.
      # NUGET_USER is the nuget.org account/profile name (NOT the email).
      # https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      - name: NuGet login (OIDC -> temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: dotnet nuget push DotnetTestSplit/nupkg/*.nupkg  --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json"
 